services:
  - type: web
    name: australia-intelligence-monitor
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: GPT4O_KEY
        sync: false
      - key: GEMINI_KEY
        sync: false
      - key: FR24_API_KEY
        sync: false
      - key: AISSTREAM_KEY
        sync: false
      - key: NASA_FIRMS_KEY
        sync: false
